<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DVD Screensaver</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #dvd {
      position: fixed;
      top: 0;
      left: 0;
      width: 180px;
      height: auto;
      transform-origin: center center;
      will-change: transform;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      cursor: pointer;
    }

    #confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  {{ $gif := resources.Get "fried-fish-sandwich-hanks.gif" }}
  {{ if $gif }}
    <img id="dvd" src="{{ $gif.RelPermalink }}" alt="Bouncing burger" draggable="false">
  {{ else }}
    <p style="color:#fff; font-family:sans-serif; padding:1rem;">GIF not found in assets.</p>
  {{ end }}

  <canvas id="confetti-layer" aria-hidden="true"></canvas>

  <script>
    (function () {
      var el = document.getElementById('dvd');
      var canvas = document.getElementById('confetti-layer');
      if (!el) return;

      var ctx = canvas.getContext('2d');
      var pieces = [];
      var COLORS = ['#ff3864','#ffdd57','#48c774','#3273dc','#ff8c42','#a855f7','#06d6a0','#ef476f'];

      var x = 40, y = 40;
      var vx = 220, vy = 180;
      var scale = 1, targetScale = 1;
      var lastTime = null;
      var boost = 0; // decays 0->1, adds up to 180px/s extra while active

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function burstConfetti(cx, cy) {
        for (var i = 0; i < 45; i++) {
          var angle = Math.random() * Math.PI * 2;
          var speed = 100 + Math.random() * 340;
          var maxLife = 1.0 + Math.random() * 0.6;
          pieces.push({
            x: cx, y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 60,
            size: 3 + Math.random() * 7,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            life: maxLife,
            maxLife: maxLife,
            rotation: Math.random() * Math.PI * 2,
            spin: -8 + Math.random() * 16,
            circle: Math.random() > 0.5
          });
        }
      }

      function updateConfetti(dt) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = pieces.length - 1; i >= 0; i--) {
          var p = pieces[i];
          p.life -= dt * 0.85;
          if (p.life <= 0) { pieces.splice(i, 1); continue; }
          p.vy += 500 * dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.rotation += p.spin * dt;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
          ctx.fillStyle = p.color;
          if (p.circle) {
            ctx.beginPath();
            ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
          }
          ctx.restore();
        }
        ctx.globalAlpha = 1;
      }

      function tick(ts) {
        var w = el.offsetWidth;
        var h = el.offsetHeight;
        var maxX = window.innerWidth - w;
        var maxY = window.innerHeight - h;

        if (lastTime === null) lastTime = ts;
        var dt = Math.min((ts - lastTime) / 1000, 0.05);
        lastTime = ts;

        x += vx * dt;
        y += vy * dt;

        var hitX = false, hitY = false;

        if (x <= 0) { x = 0; vx = Math.abs(vx); hitX = true; }
        else if (x >= maxX) { x = maxX; vx = -Math.abs(vx); hitX = true; }
        if (y <= 0) { y = 0; vy = Math.abs(vy); hitY = true; }
        else if (y >= maxY) { y = maxY; vy = -Math.abs(vy); hitY = true; }

        if (hitX || hitY) {
          // tiny random angle nudge to prevent repetitive loops
          var nudge = (Math.random() - 0.5) * 0.08;
          var spd = Math.sqrt(vx * vx + vy * vy);
          var ang = Math.atan2(vy, vx) + nudge;
          vx = Math.cos(ang) * spd;
          vy = Math.sin(ang) * spd;
        }

        if (hitX && hitY) {
          burstConfetti(x + w / 2, y + h / 2);
        }

        // decay boost and steer speed toward boosted target
        if (boost > 0) {
          boost = Math.max(0, boost - dt * 0.35);
          var curSpd = Math.sqrt(vx * vx + vy * vy);
          var targetSpd = 220 + boost * 180;
          var ratio = targetSpd / curSpd;
          vx *= ratio;
          vy *= ratio;
        }

        scale += (targetScale - scale) * 0.15;
        el.style.transform = 'translate(' + x + 'px, ' + y + 'px) scale(' + scale.toFixed(4) + ')';

        updateConfetti(dt);
        requestAnimationFrame(tick);
      }

      el.addEventListener('touchstart', function (e) {
        e.preventDefault();
        targetScale = 1.6;
        setTimeout(function () { targetScale = 1; }, 240);
        boost += 0.5;
      }, { passive: false });

      el.addEventListener('dragstart', function (e) {
        e.preventDefault();
      });

      el.addEventListener('click', function (e) {
        e.stopPropagation();
        targetScale = 1.6;
        setTimeout(function () { targetScale = 1; }, 240);
        boost += 0.5;
      });

      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) lastTime = null;
      });

      window.addEventListener('resize', function () {
        x = Math.min(x, Math.max(0, window.innerWidth - el.offsetWidth));
        y = Math.min(y, Math.max(0, window.innerHeight - el.offsetHeight));
        resize();
      });

      resize();

      if (el.complete) {
        requestAnimationFrame(tick);
      } else {
        el.addEventListener('load', function () {
          requestAnimationFrame(tick);
        }, { once: true });
      }
    })();
  </script>
</body>
</html>
